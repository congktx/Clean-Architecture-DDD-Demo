openapi: 3.0.3
info:
  title: Clean Architecture DDD Demo API
  description: API documentation for the Wallet and Budget management server.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /wallets:
    post:
      summary: Tạo ví mới
      description: API dùng để khởi tạo một ví tiền mới cho người dùng.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - owner_id
                - name
                - currency
              properties:
                owner_id:
                  type: string
                  description: ID của người dùng sở hữu ví này.
                  example: "user-123"
                name:
                  type: string
                  description: Tên hiển thị của ví (VD Cơ bản, Tiết kiệm).
                  example: "Ví chính"
                currency:
                  type: string
                  description: Mã tiền tệ chuẩn (VD USD, VND).
                  example: "VND"
      responses:
        '201':
          description: Tạo ví thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletSuccessResponse'
    get:
      summary: Lấy danh sách ví theo người dùng
      description: Lấy danh sách tất cả các ví của một người dùng.
      parameters:
        - in: query
          name: owner_id
          required: true
          schema:
            type: string
          description: ID của người dùng sở hữu ví
      responses:
        '200':
          description: Lấy danh sách ví thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletsSuccessResponse'

  /wallets/{id}:
    get:
      summary: Lấy thông tin ví
      description: Lấy thông tin chi tiết của một ví.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID của ví
      responses:
        '200':
          description: Lấy thông tin ví thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletSuccessResponse'

  /wallets/expenses:
    post:
      summary: Ghi nhận chi tiêu
      description: API dùng để trừ tiền trong ví thông qua việc ghi nhận một khoản chi tiêu.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wallet_id
                - category_id
                - amount
                - currency
              properties:
                wallet_id:
                  type: string
                  description: ID của ví cần trừ tiền.
                  example: "wallet-456"
                category_id:
                  type: string
                  description: ID của danh mục chi tiêu (VD Ăn uống, Mua sắm).
                  example: "food-789"
                amount:
                  type: string
                  description: Số tiền đã chi tiêu (dạng chuỗi để giữ độ chính xác thập phân).
                  example: "50000"
                currency:
                  type: string
                  description: Mã tiền tệ của khoản chi tiêu.
                  example: "VND"
                description:
                  type: string
                  description: Ghi chú ngắn về khoản chi tiêu.
                  example: "Ăn trưa"
      responses:
        '200':
          description: Ghi nhận chi tiêu thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletSuccessResponse'

  /wallets/incomes:
    post:
      summary: Ghi nhận thu nhập
      description: API dùng để cộng tiền vào ví thông qua việc ghi nhận một khoản thu nhập.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wallet_id
                - category_id
                - amount
                - currency
              properties:
                wallet_id:
                  type: string
                  description: ID của ví cần cộng tiền.
                  example: "wallet-456"
                category_id:
                  type: string
                  description: ID của danh mục thu nhập (VD Lương, Thưởng).
                  example: "salary-001"
                amount:
                  type: string
                  description: Số tiền thu nhập.
                  example: "5000000"
                currency:
                  type: string
                  description: Mã tiền tệ của khoản thu nhập.
                  example: "VND"
                description:
                  type: string
                  description: Ghi chú ngắn về khoản thu nhập.
                  example: "Lương tháng"
      responses:
        '200':
          description: Ghi nhận thu nhập thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletSuccessResponse'
                
  /budgets:
    post:
      summary: Tạo ngân sách mới
      description: API dùng để thiết lập ngân sách tổng cho một tháng/năm cụ thể.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - owner_id
                - month
                - year
                - total_limit
                - currency
              properties:
                owner_id:
                  type: string
                  description: ID của người dùng sở hữu ngân sách.
                  example: "user-123"
                month:
                  type: integer
                  description: Tháng áp dụng ngân sách (1-12).
                  example: 7
                year:
                  type: integer
                  description: Năm áp dụng ngân sách.
                  example: 2026
                total_limit:
                  type: string
                  description: Tổng số tiền giới hạn cho tháng này (dạng chuỗi).
                  example: "10000000"
                currency:
                  type: string
                  description: Mã tiền tệ.
                  example: "VND"
      responses:
        '201':
          description: Tạo ngân sách thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSuccessResponse'
    get:
      summary: Lấy danh sách ngân sách theo người dùng
      description: Lấy danh sách tất cả ngân sách của một người dùng.
      parameters:
        - in: query
          name: owner_id
          required: true
          schema:
            type: string
          description: ID của người dùng sở hữu ngân sách
      responses:
        '200':
          description: Lấy danh sách ngân sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetsSuccessResponse'

  /budgets/{id}:
    get:
      summary: Lấy thông tin ngân sách
      description: Lấy thông tin chi tiết của một ngân sách.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID của ngân sách
      responses:
        '200':
          description: Lấy thông tin ngân sách thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSuccessResponse'

  /budgets/allocations:
    post:
      summary: Phân bổ ngân sách
      description: API dùng để trích một phần tiền từ ngân sách tổng đưa vào một hạng mục con (category) cụ thể.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - budget_id
                - category_id
                - amount
                - currency
              properties:
                budget_id:
                  type: string
                  description: ID của ngân sách tổng.
                  example: "budget-101"
                category_id:
                  type: string
                  description: ID của danh mục cần cấp phát quỹ (VD Đi lại, Mua sắm).
                  example: "transport-202"
                amount:
                  type: string
                  description: Số tiền muốn cấp phát cho danh mục này.
                  example: "2000000"
                currency:
                  type: string
                  description: Mã tiền tệ của khoản tiền.
                  example: "VND"
      responses:
        '200':
          description: Phân bổ thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSuccessResponse'

  /budgets/rebalance:
    post:
      summary: Tái cân bằng ngân sách
      description: Tái cân bằng lại các hạn mức con trong ngân sách.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - budget_id
                - from_category_id
                - to_category_id
                - amount
                - currency
              properties:
                budget_id:
                  type: string
                  description: ID của ngân sách tổng.
                  example: "budget-101"
                from_category_id:
                  type: string
                  description: ID của hạng mục muốn rút tiền.
                  example: "category-A"
                to_category_id:
                  type: string
                  description: ID của hạng mục muốn nhận tiền.
                  example: "category-B"
                amount:
                  type: string
                  description: Số tiền tái cân bằng.
                  example: "500000"
                currency:
                  type: string
                  description: Mã tiền tệ.
                  example: "VND"
      responses:
        '200':
          description: Tái cân bằng thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSuccessResponse'

  /budgets/expenses:
    post:
      summary: Ghi nhận chi tiêu cho ngân sách
      description: Ghi nhận số tiền đã tiêu vào một hạng mục thuộc ngân sách tổng.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - budget_id
                - category_id
                - amount
                - currency
              properties:
                budget_id:
                  type: string
                  description: ID của ngân sách tổng.
                  example: "budget-101"
                category_id:
                  type: string
                  description: ID của danh mục chi tiêu.
                  example: "food-789"
                amount:
                  type: string
                  description: Số tiền đã chi.
                  example: "50000"
                currency:
                  type: string
                  description: Mã tiền tệ.
                  example: "VND"
      responses:
        '200':
          description: Ghi nhận thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSuccessResponse'

components:
  schemas:
    Wallet:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        name:
          type: string
        balance:
          type: string
        currency:
          type: string
        status:
          type: string

    WalletSuccessResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/Wallet'

    WalletsSuccessResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Wallet'

    BudgetItem:
      type: object
      properties:
        id:
          type: string
        category_id:
          type: string
        allocated_amount:
          type: string
        spent_amount:
          type: string
        currency:
          type: string

    Budget:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        month:
          type: integer
        year:
          type: integer
        total_limit:
          type: string
        currency:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/BudgetItem'

    BudgetSuccessResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/Budget'

    BudgetsSuccessResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Budget'
